<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>奶龙-TI 人格测试</title>
<meta property="og:title" content="奶龙-TI 人格测试">
<meta property="og:description" content="奶龙-TI，快来测试你是哪种龙？">
<meta property="og:image" content="https://zangenky.github.io/nailong-ti/home-logo.png">
<meta property="og:image:width" content="400">
<meta property="og:image:height" content="400">
<meta property="og:url" content="https://zangenky.github.io/nailong-ti/">
<meta property="og:type" content="website">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- 首页 -->
  <div id="page-home" class="page active">
    <div class="home-content">
      <div class="logo-area">
        <img src="home-logo.png" alt="奶龙TI" class="logo-img">
        <h1>奶龙-TI</h1>
        <p class="subtitle">测测你是哪种奶龙？</p>
      </div>
      <div class="home-desc">
        <p style="font-size:13px;color:#999;text-align:center;margin:0;">本测试纯属娱乐，切勿当真</p>
      </div>
      <button id="start-btn" class="primary-btn">开始测试 →</button>
    </div>
  </div>

  <!-- 答题页 -->
  <div id="page-quiz" class="page">
    <div class="quiz-header">
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <div id="progress-text" class="progress-text">1 / 16</div>
    </div>
    <h2 id="question-text" class="question-text"></h2>
    <div id="options-container" class="options-container"></div>
  </div>

  <!-- 结果页 -->
  <div id="page-result" class="page">
    <div class="result-content">
      <div id="result-type" class="result-type" style="display:none;">ENTJ</div>
      <div id="result-dragon-name" class="result-dragon-name">奶机</div>
      <div id="result-image" class="result-image">
        <div class="image-placeholder">🐉</div>
      </div>
      <div id="result-desc" class="result-desc"></div>
      <div class="result-dims">
        <div class="dim-bar">
          <span class="dim-label">抽象</span>
          <div class="dim-track">
            <div id="dim-ei" class="dim-fill"></div>
          </div>
          <span class="dim-label">正经</span>
        </div>
        <div class="dim-bar">
          <span class="dim-label">直觉</span>
          <div class="dim-track">
            <div id="dim-ns" class="dim-fill"></div>
          </div>
          <span class="dim-label">实感</span>
        </div>
        <div class="dim-bar">
          <span class="dim-label">理性</span>
          <div class="dim-track">
            <div id="dim-tf" class="dim-fill"></div>
          </div>
          <span class="dim-label">感性</span>
        </div>
        <div class="dim-bar">
          <span class="dim-label">计划</span>
          <div class="dim-track">
            <div id="dim-jp" class="dim-fill"></div>
          </div>
          <span class="dim-label">随性</span>
        </div>
      </div>
      <button id="retest-btn" class="secondary-btn">重新测试</button>
    </div>
  </div>

  <!-- 管理页 -->
  <div id="page-admin" class="page">
    <div class="admin-content">
      <h2>🛠 奶龙-TI 管理后台</h2>
      <p class="subtitle">上传形象图 + 设置名称和描述</p>
      <div id="admin-list" class="admin-list"></div>
      <button id="admin-back-btn" class="secondary-btn">← 返回首页</button>
    </div>
  </div>

</div>

<div class="nav-bar">
  <button class="nav-btn" data-page="home">🏠 首页</button>
  <button id="admin-nav-btn" class="nav-btn" data-page="admin">🛠 管理</button>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
